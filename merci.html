<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merci! — Entretien Extérieur Élite</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .merci-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      text-align: center;
    }
    .merci-icon {
      width: 80px; height: 80px;
      background: rgba(201,168,76,0.1);
      border: 2px solid var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
      color: var(--gold);
    }
    .merci-icon svg { width: 40px; height: 40px; }
    .merci-section h1 { margin-bottom: 16px; }
    .merci-section p { max-width: 480px; margin: 0 auto 32px; }
  </style>
</head>
<body>

<header class="site-header scrolled">
  <div class="header-inner">
    <a href="index.html" class="header-logo">
      <div class="logo-text">Entretien Extérieur <span>Élite</span></div>
    </a>
  </div>
</header>

<section class="merci-section">
  <div>
    <div class="merci-icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 01-1.043 3.296 3.745 3.745 0 01-3.296 1.043A3.745 3.745 0 0112 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 01-3.296-1.043 3.745 3.745 0 01-1.043-3.296A3.745 3.745 0 013 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 011.043-3.296 3.746 3.746 0 013.296-1.043A3.746 3.746 0 0112 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 013.296 1.043 3.746 3.746 0 011.043 3.296A3.745 3.745 0 0121 12z"/></svg>
    </div>
    <span class="section-label">Demande reçue</span>
    <h1>Merci pour votre demande!</h1>
    <p>On a bien reçu votre soumission. Un membre de notre équipe vous contactera dans les <strong style="color:var(--gold);">24 heures</strong> pour planifier votre estimation gratuite.</p>
    <a href="index.html" class="btn btn-gold">Retour à l'accueil</a>
  </div>
</section>

</body>
</html>
