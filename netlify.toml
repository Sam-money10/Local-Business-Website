# Netlify Configuration — Entretien Extérieur Élite

[build]
  # No build step needed — static HTML files
  publish = "."
  functions = "netlify/functions"

# Redirect form submissions to the thank-you page
[[redirects]]
  from   = "/soumission"
  to     = "/merci.html"
  status = 200

# Note: SMS notifications are triggered via a webhook in the Netlify dashboard.
# After deploying: Site settings → Forms → soumission → Notifications
# Add a webhook pointing to: https://[your-site].netlify.app/.netlify/functions/quote-notify

[functions]
  node_bundler = "esbuild"
